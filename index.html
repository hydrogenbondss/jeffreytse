        // Hook for scroll position
        const useScrollPosition = () => {
            const [scrollY, setScrollY] = useState(0);
            useEffect(() => {
                const handleScroll = () => setScrollY(window.scrollY);
                window.addEventListener('scroll', handleScroll, { passive: true });
                return () => window.removeEventListener('scroll', handleScroll);
            }, []);
            return scrollY;
        };

        // Lazy Video Component
        const LazyVideo = ({ src, poster, className }) => {
            const [isLoaded, setIsLoaded] = useState(false);
            const videoRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver((entries) => {
                    entries.forEach(entry => {
                        if (entry.isIntersecting && videoRef.current) {
                            videoRef.current.load();
                            setIsLoaded(true);
                            observer.unobserve(entry.target);
                        }
                    });
                }, { threshold: 0.1 });

                if (videoRef.current) observer.observe(videoRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <video 
                    ref={videoRef}
                    className={className}
                    autoPlay 
                    muted 
                    loop 
                    playsInline
                    poster={poster}
                    preload="none"
                >
                    <source src={src} type="video/mp4" />
                </video>
            );
        };

                                                                className="inline-flex items-center gap-2 px-6 py-3 border border-gray-300 dark:border-gray-700 rounded-full font-medium hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
                                                            >
                                                                <i data-lucide="github" className="w-4 h-4"></i>
                                                                Source Code
                                                            </a>
                                                        )}
                                                    </div>
                                                </div>
                                            </div>
                                        </motion.div>
                                    </div>
                                </motion.div>
                            )}
                        </AnimatePresence>

                        <style>{`
                            @keyframes marquee { 
                                0% { transform: translateX(0); } 
                                100% { transform: translateX(-33.33%); } 
                            } 
                            .animate-marquee { 
                                animation: marquee 30s linear infinite; 
                            } 
                            .no-scrollbar::-webkit-scrollbar { 
                                display: none; 
                            } 
                            .no-scrollbar { 
                                -ms-overflow-style: none; 
                                scrollbar-width: none; 
                            }
                        `}</style>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
