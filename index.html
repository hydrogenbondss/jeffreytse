            background: white;
            transition: all 0.3s;
        }

        .hamburger.open span:nth-child(2) {
            opacity: 0;
        }
        
        .hamburger.open span:nth-child(3) {

            backface-visibility: hidden;
        }

        const LazyVideo = memo(({ src, poster, className }) => {
            const [isLoaded, setIsLoaded] = useState(false);
            const [isInView, setIsInView] = useState(false);
            const containerRef = useRef(null);

            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsInView(true);
                        observer.disconnect();
                    }
                }, { threshold: 0.1, rootMargin: '50px' });
                
                if (containerRef.current) observer.observe(containerRef.current);
                return () => observer.disconnect();
            }, []);

            return (
                <div ref={containerRef} className={`relative ${className}`}>
                    {!isLoaded && (
                        <div className="video-skeleton">
                            <div className="w-10 h-10 border-4 border-white/20 border-t-white rounded-full animate-spin"></div>
                        </div>
                    )}
                    
                    <img 
                        src={poster} 
                        alt="Loading"
                        className={`video-poster ${isLoaded ? 'loaded' : ''}`}
                    />
                    
                    {isInView && (
                        <video 
                            src={src}
                            autoPlay 
                            muted 
                            loop 
                            playsInline
                            poster={poster}
                            onLoadedData={() => setIsLoaded(true)}
                            className={`absolute inset-0 w-full h-full object-cover transition-opacity duration-500 ${isLoaded ? 'opacity-100' : 'opacity-0'}`}
                            style={{ willChange: 'transform' }}
                        />
                    )}
                </div>
            );
        });

        function useInView(ref, options = {}) {
            const [isInView, setIsInView] = useState(false);
            
            useEffect(() => {
                const observer = new IntersectionObserver(([entry]) => {
                    if (entry.isIntersecting) {
                        setIsInView(true);
                        if (options.once !== false) observer.disconnect();
                    }
                }, { threshold: 0.1, ...options });
                
                if (ref.current) observer.observe(ref.current);
                return () => observer.disconnect();
            }, [ref, options.once]);
            
            return isInView;
        }

                    <section id="selected-works" className="sticky top-16 z-30 bg-white/90 dark:bg-black/90 backdrop-blur-md border-b border-gray-200 dark:border-gray-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-4">
                            <div className="flex items-center justify-between">
                                <h2 className="font-display text-lg font-bold hidden md:block text-gray-900 dark:text-white">Selected Works</h2>
                                <div className="flex items-center gap-2 overflow-x-auto no-scrollbar w-full md:w-auto">
                                    {[
                                        { id: 'all', label: 'All Work' },
                                        { id: 'fashion', label: 'Fashion' },
                                        { id: 'tech', label: 'Tech / AI' },
                                        { id: 'corporate', label: 'Corporate' }
                                    ].map((btn) => (
                                        <button
                                            key={btn.id}
                                            onClick={() => setFilter(btn.id)}
                                            className={`filter-btn whitespace-nowrap ${filter === btn.id ? 'active' : ''} ${darkMode ? 'border-gray-700 text-gray-300' : 'border-gray-300 text-gray-600'}`}
                                        >
                                            {btn.label}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Projects Grid */}
                    <section className="py-12 md:py-20 bg-white dark:bg-black">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                {sortedProjects.map((project, index) => (
                                    <ProjectCard 
                                        key={project.title}
                                        project={project}
                                        index={index}
                                        onSelect={setSelectedProject}
                                        darkMode={darkMode}
                                    />
                                ))}
                            </div>
                        </div>
                    </section>

                    {/* Services Section */}
                    <section id="services" className="py-20 bg-gray-50 dark:bg-gray-900/20 border-t border-gray-200 dark:border-gray-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid md:grid-cols-2 gap-12 items-start">
                                <div>
                                    <h2 className="font-display text-4xl md:text-5xl font-bold mb-6 text-gray-900 dark:text-white">Services</h2>
                                    <p className="text-lg text-gray-600 dark:text-gray-400 mb-8 leading-relaxed">
                                        Combining editorial rigor with cutting-edge AI tools to deliver content that resonates. 
                                        From brand campaigns to interactive experiences.
                                    </p>
                                    
                                    <div className="space-y-4 mb-12">
                                        {capabilities.roles.map((role, index) => (
                                            <div key={role} className="flex items-center gap-4 group">
                                                <span className="font-display text-2xl font-bold text-gray-300 dark:text-gray-700 group-hover:text-gray-400 transition-colors">
                                                    0{index + 1}
                                                </span>
                                                <span className="text-lg font-medium text-gray-900 dark:text-white">{role}</span>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                
                                <div className="space-y-6">
                                    <h3 className="font-display text-xl font-bold mb-4 text-gray-900 dark:text-white">Software Stack</h3>
                                    <div className="flex flex-wrap gap-2">
                                        {capabilities.software.map((tool) => (
                                            <span 
                                                key={tool}
                                                className={`software-tag ${darkMode ? 'bg-gray-800 text-gray-300 border border-gray-700' : 'bg-gray-200 text-gray-700'}`}
                                            >
                                                {tool}
                                            </span>
                                        ))}
                                    </div>
                                    
                                    <div className="mt-8 p-6 rounded-2xl bg-white dark:bg-gray-800 border border-gray-200 dark:border-gray-700">
                                        <h4 className="font-display text-lg font-bold mb-2 text-gray-900 dark:text-white">Current Focus</h4>
                                        <p className="text-sm text-gray-600 dark:text-gray-400">
                                            Available for freelance projects and collaborations. 
                                            Currently exploring AI-driven character design and generative workflows 
                                            for fashion and product visualization.
                                        </p>
                                        <div className="mt-4 flex items-center gap-2 text-sm">
                                            <span className="status-dot"></span>
                                            <span className="text-green-600 dark:text-green-400 font-medium">Accepting new projects</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Clients Marquee */}
                    <section className="py-12 bg-black text-white overflow-hidden border-y border-gray-800">
                        <div className="flex animate-marquee whitespace-nowrap">
                            {[...clients, ...clients, ...clients].map((client, index) => (
                                <span key={index} className="mx-8 font-display text-2xl font-bold text-gray-500 hover:text-white transition-colors cursor-default">
                                    {client}
                                </span>
                            ))}
                        </div>
                    </section>

                    {/* About Section */}
                    <section id="about" className="py-20 bg-white dark:bg-black">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
                            <div className="grid md:grid-cols-3 gap-12">
                                <div className="md:col-span-1">
                                    <div className="aspect-[3/4] rounded-2xl overflow-hidden bg-gray-100 dark:bg-gray-800 sticky top-24">
                                        <img 
                                            src={PROFILE_IMAGE} 
                                            alt="Jeffrey Tse"
                                            className="w-full h-full object-cover"
                                            onError={(e) => {
                                                e.target.src = 'https://images.unsplash.com/photo-1507003211169-0a1dd7228f2d?w=600&q=80';
                                            }}
                                        />
                                    </div>
                                </div>
                                <div className="md:col-span-2 space-y-6">
                                    <h2 className="font-display text-4xl font-bold text-gray-900 dark:text-white">About</h2>
                                    <div className="prose dark:prose-invert max-w-none">
                                        <p className="text-lg leading-relaxed text-gray-600 dark:text-gray-400">
                                            Former Chief Editor at I.T Apparels, now operating at the intersection of 
                                            content strategy and AI-powered creative production. I've led editorial teams, 
                                            directed brand campaigns for Samsung and Ocean Park, and developed interactive 
                                            web experiences.
                                        </p>
                                        <p className="text-lg leading-relaxed text-gray-600 dark:text-gray-400">
                                            Currently focused on character design and generative workflows—exploring how 
                                            AI tools can augment (not replace) human creativity in fashion and product 
                                            visualization.
                                        </p>
                                    </div>
                                    
                                    <div className="grid grid-cols-2 gap-4 pt-6">
                                        <div className="p-4 rounded-xl bg-gray-50 dark:bg-gray-900">
                                            <div className="font-display text-3xl font-bold mb-1 text-gray-900 dark:text-white">6+</div>
                                            <div className="text-sm text-gray-600 dark:text-gray-400">Years in Fashion Media</div>
                                        </div>
                                        <div className="p-4 rounded-xl bg-gray-50 dark:bg-gray-900">
                                            <div className="font-display text-3xl font-bold mb-1 text-gray-900 dark:text-white">50+</div>
                                            <div className="text-sm text-gray-600 dark:text-gray-400">Brand Campaigns</div>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </section>

                    {/* Contact Section */}
                    <section id="contact" className="py-20 bg-gray-50 dark:bg-gray-900/20 border-t border-gray-200 dark:border-gray-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 text-center">
                            <h2 className="font-display text-4xl md:text-6xl font-bold mb-6 text-gray-900 dark:text-white">Let's work together</h2>
                            <p className="text-lg text-gray-600 dark:text-gray-400 mb-8 max-w-2xl mx-auto">
                                Open to freelance projects, brand collaborations, and creative partnerships.
                            </p>
                            <a 
                                href="mailto:jeffrey@example.com" 
                                className="inline-flex items-center gap-2 px-8 py-4 bg-black dark:bg-white text-white dark:text-black rounded-full font-medium hover:opacity-80 transition-opacity"
                            >
                                Get in Touch
                                <i data-lucide="arrow-right" className="w-4 h-4"></i>
                            </a>
                            
                            <div className="mt-12 flex justify-center gap-6">
                                <a href="https://github.com/hydrogenbondss" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                                    <i data-lucide="github" className="w-6 h-6"></i>
                                </a>
                                <a href="https://www.instagram.com/hydrogenbondss/" target="_blank" rel="noopener noreferrer" className="text-gray-400 hover:text-gray-600 dark:hover:text-gray-300 transition-colors">
                                    <i data-lucide="instagram" className="w-6 h-6"></i>
                                </a>
                            </div>
                        </div>
                    </section>

                    {/* Footer */}
                    <footer className="py-8 bg-white dark:bg-black border-t border-gray-200 dark:border-gray-800">
                        <div className="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 flex flex-col md:flex-row justify-between items-center gap-4">
                            <p className="text-sm text-gray-500">© 2026 Jeffrey Tse. All rights reserved.</p>
                            <p className="text-sm text-gray-500">Built with React, Tailwind & Framer Motion</p>
                        </div>
                    </footer>

                    {/* Project Modal */}
                    <AnimatePresence>
                        {selectedProject && (
                            <motion.div 
                                initial={{ opacity: 0 }}
                                animate={{ opacity: 1 }}
                                exit={{ opacity: 0 }}
                                className="fixed inset-0 z-50 bg-black/95 backdrop-blur-sm overflow-y-auto"
                                onClick={() => {
                                    setSelectedProject(null);
                                    setCurrentMediaIndex(0);
                                }}
                            >
                                <div className="min-h-screen md:flex md:items-center md:justify-center p-4 md:p-8">
                                    <motion.div 
                                        initial={{ scale: 0.9, opacity: 0 }}
                                        animate={{ scale: 1, opacity: 1 }}
                                        exit={{ scale: 0.9, opacity: 0 }}
                                        className="w-full max-w-6xl bg-white dark:bg-gray-900 rounded-2xl overflow-hidden shadow-2xl"
                                        onClick={(e) => e.stopPropagation()}
                                    >
                                        <div className="grid md:grid-cols-2">
                                            <div className="bg-black relative min-h-[300px] md:min-h-[600px]">
                                                {selectedProject.video && !selectedProject.hasMediaCarousel ? (
                                                    <div className="modal-media-container">
                                                        {selectedProject.video.includes('youtube') ? (
                                                            <iframe 
                                                                src={selectedProject.video} 
                                                                title={selectedProject.title}
                                                                className="w-full h-full"
                                                                frameBorder="0"
                                                                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                                allowFullScreen
                                                            ></iframe>
                                                        ) : (
                                                            <video 
                                                                src={selectedProject.video}
                                                                controls
                                                                autoPlay
                                                                className="max-h-full max-w-full"
                                                                poster={selectedProject.image}
                                                            ></video>
                                                        )}
                                                    </div>
                                                ) : selectedProject.hasMediaCarousel ? (
                                                    <div className="media-carousel">
                                                        <AnimatePresence mode="wait">
                                                            <motion.div
                                                                key={currentMediaIndex}
                                                                initial={{ opacity: 0, x: 100 }}
                                                                animate={{ opacity: 1, x: 0 }}
                                                                exit={{ opacity: 0, x: -100 }}
                                                                transition={{ duration: 0.3 }}
                                                                className="carousel-slide"
                                                            >
                                                                {selectedProject.mediaItems[currentMediaIndex].type === 'youtube' ? (
                                                                    <iframe 
                                                                        src={selectedProject.mediaItems[currentMediaIndex].url}
                                                                        title={selectedProject.mediaItems[currentMediaIndex].title}
                                                                        className="w-full h-full rounded-lg"
                                                                        frameBorder="0"
                                                                        allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                                                                        allowFullScreen
                                                                    ></iframe>
                                                                ) : selectedProject.mediaItems[currentMediaIndex].type === 'video' ? (
                                                                    <video 
                                                                        src={selectedProject.mediaItems[currentMediaIndex].url}
                                                                        controls
                                                                        autoPlay
                                                                        className="max-h-full max-w-full rounded-lg"
                                                                        poster={selectedProject.mediaItems[currentMediaIndex].thumbnail}
                                                                    ></video>
                                                                ) : selectedProject.mediaItems[currentMediaIndex].type === 'instagram' ? (
                                                                    <div className="instagram-embed">
                                                                        <i data-lucide="instagram" className="w-12 h-12 mb-4"></i>
                                                                        <p className="font-medium mb-2">{selectedProject.mediaItems[currentMediaIndex].title}</p>
                                                                        <a 
                                                                            href={selectedProject.mediaItems[currentMediaIndex].url}
                                                                            target="_blank"
                                                                            rel="noopener noreferrer"
                                                                            className="text-sm underline hover:no-underline"
                                                                        >
                                                                            View on Instagram →
                                                                        </a>
                                                                    </div>
                                                                ) : selectedProject.mediaItems[currentMediaIndex].type === 'placeholder' ? (
                                                                    <div className="flex flex-col items-center justify-center text-white">
                                                                        <i data-lucide="clock" className="w-16 h-16 mb-4 opacity-50"></i>
                                                                        <p className="text-xl font-bold">{selectedProject.mediaItems[currentMediaIndex].title}</p>
                                                                        <p className="text-sm opacity-70 mt-2">Coming soon</p>
                                                                    </div>
                                                                ) : (
                                                                    <img 
                                                                        src={selectedProject.mediaItems[currentMediaIndex].url}
                                                                        alt={selectedProject.mediaItems[currentMediaIndex].title}
                                                                        className="max-h-full max-w-full object-contain rounded-lg"
                                                                    />
                                                                )}
                                                            </motion.div>
                                                        </AnimatePresence>
                                                        
                                                        {selectedProject.mediaItems.length > 1 && (
                                                            <>
                                                                <button className="carousel-arrow prev" onClick={prevMedia}>
                                                                    <i data-lucide="chevron-left" className="w-6 h-6"></i>
                                                                </button>
                                                                <button className="carousel-arrow next" onClick={nextMedia}>
                                                                    <i data-lucide="chevron-right" className="w-6 h-6"></i>
                                                                </button>
                                                                <div className="carousel-nav">
                                                                    {selectedProject.mediaItems.map((_, idx) => (
                                                                        <button
                                                                            key={idx}
                                                                            className={`carousel-dot ${idx === currentMediaIndex ? 'active' : ''}`}
                                                                            onClick={() => setCurrentMediaIndex(idx)}
                                                                        />
                                                                    ))}
                                                                </div>
                                                            </>
                                                        )}
                                                    </div>
                                                ) : (
                                                    <div className="modal-media-container">
                                                        <img 
                                                            src={selectedProject.image} 
                                                            alt={selectedProject.title}
                                                            className="max-h-full max-w-full object-contain"
                                                        />
                                                    </div>
                                                )}
                                            </div>

                                            <div className="p-8 md:p-12 flex flex-col">
                                                <div className="flex items-center justify-between mb-4">
                                                    <div className="flex items-center gap-2 flex-wrap">
                                                        {selectedProject.isClient && (
                                                            <span className="client-badge">
                                                                <i data-lucide="briefcase" className="w-3 h-3"></i>
                                                                {selectedProject.clientName}
                                                            </span>
                                                        )}
                                                        {selectedProject.isPersonal && (
                                                            <span className="personal-badge">
                                                                <i data-lucide="user" className="w-3 h-3"></i>
                                                                Personal
                                                            </span>
                                                        )}
                                                        {selectedProject.isEditorial && (
                                                            <span className="editorial-badge">
                                                                <i data-lucide="pen-tool" className="w-3 h-3"></i>
                                                                Editorial
                                                            </span>
                                                        )}
                                                    </div>
                                                    <button 
                                                        onClick={() => {
                                                            setSelectedProject(null);
                                                            setCurrentMediaIndex(0);
                                                        }}
                                                        className="p-2 hover:bg-gray-100 dark:hover:bg-gray-800 rounded-full transition-colors"
                                                    >
                                                        <i data-lucide="x" className="w-6 h-6"></i>
                                                    </button>
                                                </div>

                                                <div className="mb-6">
                                                    <p className="text-sm text-gray-500 dark:text-gray-400 mb-2">{selectedProject.year}</p>
                                                    <h2 className="font-display text-3xl md:text-4xl font-bold mb-2 text-gray-900 dark:text-white">{selectedProject.title}</h2>
                                                    <p className="text-lg text-gray-600 dark:text-gray-400">{selectedProject.category}</p>
                                                </div>

                                                <div className="prose dark:prose-invert max-w-none mb-8 flex-grow">
                                                    <p className="text-gray-600 dark:text-gray-400 leading-relaxed">
                                                        {selectedProject.fullDescription}
                                                    </p>
                                                    
                                                    {selectedProject.role && (
                                                        <div className="mt-6 pt-6 border-t border-gray-200 dark:border-gray-800">
                                                            <p className="text-sm font-medium text-gray-900 dark:text-gray-100 mb-1">Role</p>
                                                            <p className="text-gray-600 dark:text-gray-400">{selectedProject.role}</p>
                                                        </div>
                                                    )}

                                                    {selectedProject.relatedLinks && (
                                                        <div className="mt-6 space-y-2">
                                                            {selectedProject.relatedLinks.map((link) => (
                                                                <a 
                                                                    key={link.url}
                                                                    href={link.url}
                                                                    target="_blank"
                                                                    rel="noopener noreferrer"
                                                                    className="flex items-center gap-2 text-sm text-blue-600 dark:text-blue-400 hover:underline"
                                                                >
                                                                    {link.title}
                                                                    <i data-lucide="external-link" className="w-3 h-3"></i>
                                                                </a>
                                                            ))}
                                                        </div>
                                                    )}
                                                </div>

                                                <div className="flex flex-wrap gap-3 mt-auto pt-6 border-t border-gray-200 dark:border-gray-800">
                                                    {selectedProject.link && (
                                                        <a 
                                                            href={selectedProject.link}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            className="inline-flex items-center gap-2 px-6 py-3 bg-black dark:bg-white text-white dark:text-black rounded-full font-medium hover:opacity-80 transition-opacity"
                                                        >
                                                            View Project
                                                            <i data-lucide="external-link" className="w-4 h-4"></i>
                                                        </a>
                                                    )}
                                                    {selectedProject.github && (
                                                        <a 
                                                            href={selectedProject.github}
                                                            target="_blank"
                                                            rel="noopener noreferrer"
                                                            className="inline-flex items-center gap-2 px-6 py-3 border border-gray-300 dark:border-gray-700 rounded-full font-medium hover:bg-gray-50 dark:hover:bg-gray-800 transition-colors"
                                                        >
                                                            <i data-lucide="github" className="w-4 h-4"></i>
                                                            Source Code
                                                        </a>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    </motion.div>
                                </div>
                            </motion.div>
                        )}
                    </AnimatePresence>

                    <style>{`
                        @keyframes marquee {
                            0% { transform: translateX(0); }
                            100% { transform: translateX(-33.33%); }
                        }
                        .animate-marquee {
                            animation: marquee 30s linear infinite;
                        }
                        .no-scrollbar::-webkit-scrollbar {
                            display: none;
                        }
                        .no-scrollbar {
                            -ms-overflow-style: none;
                            scrollbar-width: none;
                        }
                    `}</style>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
